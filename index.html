<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Book Store</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>📚 Online Book Store</h1>
    </header>

    <section class="book-list">
        <div class="book" data-price="500">
            <h3>C# Programming</h3>
            <p>Author: John Smith</p>
            <p>Price: ₹500</p>
            <button onclick="buyBook(this)">Buy</button>
        </div>

        <div class="book" data-price="650">
            <h3>ASP.NET Core Guide</h3>
            <p>Author: David Miller</p>
            <p>Price: ₹650</p>
            <button onclick="buyBook(this)">Buy</button>
        </div>

        <div class="book" data-price="450">
            <h3>Web Development</h3>
            <p>Author: Robert Brown</p>
            <p>Price: ₹450</p>
            <button onclick="buyBook(this)">Buy</button>
        </div>
    </section>

    <footer>
        <p>Total Amount: ₹<span id="total">0</span></p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
